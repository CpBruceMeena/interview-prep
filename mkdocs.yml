# 🎯 Interview Prep — GitHub Pages Configuration
site_name: Interview Prep
site_description: >-
  Comprehensive interview preparation for Staff/Principal backend engineers.
  18 LLD projects with SOLID design patterns, RAG chatbot implementation,
  language deep-dives (Python/Go), and 8 CS core topics with 90+ staff-level questions.
site_url: https://cpbrucemeena.github.io/interview-prep/
site_author: CpBruceMeena
copyright: Built with ❤️ for backend engineers preparing for Senior/Staff/Principal-level interviews

repo_url: https://github.com/CpBruceMeena/interview-prep
repo_name: CpBruceMeena/interview-prep
edit_uri: edit/main/docs/

docs_dir: docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/book-open-page-variant
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CpBruceMeena/interview-prep
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_KEY, '']

extra_css:
  - assets/stylesheets/extra.css
  - assets/stylesheets/mobile.css

plugins:
  - search:
      lang:
        - en
  - drawio

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html
  - footnotes
  - def_list

extra_javascript:
  - assets/javascripts/mathjax.js
  - assets/javascripts/sidebar-click.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js



