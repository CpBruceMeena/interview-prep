<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Menlo, monospace" font-size="12">
  <rect x="0" y="0" width="900" height="500" fill="#ffffff"/>
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Tic-Tac-Toe — Class Diagram</text>

  <!-- Player (Abstract) -->
  <rect x="50" y="60" width="220" height="120" rx="8" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2"/>
  <text x="160" y="80" text-anchor="middle" font-size="11" font-style="italic" fill="#F57F17">&lt;&lt;Abstract&gt;&gt;</text>
  <text x="160" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Player</text>
  <line x1="50" y1="105" x2="270" y2="105" stroke="#FBC02D" stroke-width="1"/>
  <text x="60" y="120" fill="#555">- _name: str</text>
  <text x="60" y="135" fill="#555">- _symbol: PlayerSymbol</text>
  <line x1="50" y1="145" x2="270" y2="145" stroke="#FBC02D" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="60" y="160" font-style="italic" fill="#555">+ get_move(board) → Tuple</text>

  <!-- HumanPlayer -->
  <rect x="330" y="60" width="180" height="80" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="420" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">HumanPlayer</text>
  <line x1="330" y1="90" x2="510" y2="90" stroke="#FF9800" stroke-width="1"/>
  <text x="340" y="108" fill="#555">+ get_move(board)</text>
  <text x="340" y="125" font-style="italic" fill="#888">(reads from console)</text>

  <!-- BotPlayer -->
  <rect x="330" y="160" width="200" height="100" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2"/>
  <text x="430" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">BotPlayer</text>
  <line x1="330" y1="190" x2="530" y2="190" stroke="#FF9800" stroke-width="1"/>
  <text x="340" y="208" fill="#555">+ get_move(board)</text>
  <text x="340" y="225" font-style="italic" fill="#888">(minimax algorithm)</text>
  <text x="340" y="242" fill="#555">- _minimax()</text>

  <!-- Board -->
  <rect x="50" y="240" width="240" height="180" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="170" y="260" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Board</text>
  <line x1="50" y1="270" x2="290" y2="270" stroke="#4CAF50" stroke-width="1"/>
  <text x="60" y="288" fill="#555">- _grid: List[List[Optional[Piece]]]</text>
  <text x="60" y="305" fill="#555">- _move_history: List[Tuple]</text>
  <line x1="50" y1="315" x2="290" y2="315" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="60" y="333" fill="#555">+ is_valid_move(pos) → bool</text>
  <text x="60" y="350" fill="#555">+ place_move(pos, symbol)</text>
  <text x="60" y="367" fill="#555">+ check_winner() → Optional</text>
  <text x="60" y="384" fill="#555">+ display()</text>
  <text x="60" y="401" fill="#555">+ is_full() → bool</text>

  <!-- Game (Facade) -->
  <rect x="350" y="320" width="240" height="140" rx="8" fill="#E3F2FD" stroke="#2196F3" stroke-width="2"/>
  <text x="470" y="338" text-anchor="middle" font-size="11" font-style="italic" fill="#1565C0">&lt;&lt;Facade&gt;&gt;</text>
  <text x="470" y="355" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">TicTacToeGame</text>
  <line x1="350" y1="365" x2="590" y2="365" stroke="#2196F3" stroke-width="1"/>
  <text x="360" y="383" fill="#555">- _board: Board</text>
  <text x="360" y="400" fill="#555">- _player1, _player2: Player</text>
  <text x="360" y="417" fill="#555">- _current_player: Player</text>
  <text x="360" y="434" fill="#555">- _status: GameStatus</text>
  <line x1="350" y1="444" x2="590" y2="444" stroke="#2196F3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="360" y="452" fill="#555">+ play_turn() / play() / reset()</text>

  <!-- Inheritance arrows -->
  <line x1="270" y1="90" x2="325" y2="90" stroke="#FF9800" stroke-width="2"/>
  <polygon points="320,84 335,90 320,96" fill="#FF9800"/>
  <text x="295" y="83" text-anchor="middle" font-size="9" fill="#FF9800">&lt;&lt;extends&gt;&gt;</text>

  <line x1="270" y1="200" x2="325" y2="200" stroke="#FF9800" stroke-width="2"/>
  <polygon points="320,194 335,200 320,206" fill="#FF9800"/>
  <text x="295" y="193" text-anchor="middle" font-size="9" fill="#FF9800">&lt;&lt;extends&gt;&gt;</text>

  <!-- Composition arrows -->
  <line x1="350" y1="370" x2="295" y2="350" stroke="#2196F3" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="350" y1="400" x2="295" y2="180" stroke="#2196F3" stroke-width="1" stroke-dasharray="5,3"/>
</svg>